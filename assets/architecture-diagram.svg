<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="archBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#CD5C5C"/>
      <stop offset="100%" stop-color="#8B0000"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#DAA520"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#DAA520"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="700" fill="url(#archBg)"/>

  <!-- 标题区 -->
  <rect x="0" y="0" width="1200" height="60" fill="#8B0000"/>
  <text x="600" y="40" text-anchor="middle" font-family="'SimHei',serif" font-size="28" font-weight="bold" fill="#FFD700">mao-skill 架构全景</text>

  <!-- 顶部装饰线 -->
  <line x1="0" y1="60" x2="1200" y2="60" stroke="#DAA520" stroke-width="2"/>

  <!-- ===== 输入层 ===== -->
  <g transform="translate(100, 100)">
    <rect x="0" y="0" width="200" height="50" rx="8" fill="#2a2a2a" stroke="#CD5C5C" stroke-width="2" filter="url(#shadow)"/>
    <text x="100" y="32" text-anchor="middle" font-family="'SimSun',serif" font-size="16" fill="#f5f5dc">用户输入</text>
  </g>

  <!-- 用户输入详情 -->
  <g transform="translate(100, 170)">
    <rect x="0" y="0" width="200" height="120" rx="6" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
    <text x="100" y="25" text-anchor="middle" font-size="12" fill="#888">触发词</text>
    <text x="100" y="45" text-anchor="middle" font-size="11" fill="#CD5C5C">"毛泽东视角"</text>
    <text x="100" y="70" text-anchor="middle" font-size="12" fill="#888">问题类型</text>
    <text x="100" y="90" text-anchor="middle" font-size="11" fill="#DAA520">分析/对话/VTuber</text>
  </g>

  <!-- ===== 处理层 ===== -->
  <g transform="translate(400, 80)">
    <rect x="0" y="0" width="400" height="200" rx="10" fill="#1a1a1a" stroke="url(#goldGrad)" stroke-width="2" filter="url(#shadow)"/>
    <text x="200" y="30" text-anchor="middle" font-family="'SimHei',serif" font-size="18" font-weight="bold" fill="#FFD700">核心引擎 Core Engine</text>

    <!-- 5大心智模型 -->
    <g transform="translate(30, 50)">
      <circle cx="30" cy="20" r="18" fill="url(#redGrad)"/>
      <text x="30" y="25" text-anchor="middle" font-size="14">🧠</text>
      <text x="80" y="25" font-family="'SimSun',serif" font-size="13" fill="#f5f5dc">实践论</text>
    </g>
    <g transform="translate(30, 85)">
      <circle cx="30" cy="20" r="18" fill="#DAA520"/>
      <text x="30" y="25" text-anchor="middle" font-size="14">⚔️</text>
      <text x="80" y="25" font-family="'SimSun',serif" font-size="13" fill="#f5f5dc">矛盾分析法</text>
    </g>
    <g transform="translate(30, 120)">
      <circle cx="30" cy="20" r="18" fill="url(#redGrad)"/>
      <text x="30" y="25" text-anchor="middle" font-size="14">👥</text>
      <text x="80" y="25" font-family="'SimSun',serif" font-size="13" fill="#f5f5dc">人民主体论</text>
    </g>
    <g transform="translate(30, 155)">
      <circle cx="30" cy="20" r="18" fill="#00CED1"/>
      <text x="30" y="25" text-anchor="middle" font-size="14">🎯</text>
      <text x="80" y="25" font-family="'SimSun',serif" font-size="13" fill="#f5f5dc">以弱胜强论</text>
    </g>

    <!-- 10条启发式 -->
    <g transform="translate(220, 50)">
      <rect x="0" y="0" width="150" height="120" rx="4" fill="#0d0d0d" stroke="#333"/>
      <text x="75" y="20" text-anchor="middle" font-size="12" fill="#DAA520" font-weight="bold">10条决策启发式</text>
      <text x="75" y="45" text-anchor="middle" font-size="10" fill="#888">没调查不做决策</text>
      <text x="75" y="65" text-anchor="middle" font-size="10" fill="#888">找到主要矛盾</text>
      <text x="75" y="85" text-anchor="middle" font-size="10" fill="#888">打得赢就打</text>
      <text x="75" y="105" text-anchor="middle" font-size="10" fill="#888">...更多</text>
    </g>
  </g>

  <!-- ===== 模式层 ===== -->
  <g transform="translate(400, 310)">
    <rect x="0" y="0" width="400" height="140" rx="10" fill="#1a1a1a" stroke="#666" stroke-width="2" filter="url(#shadow)"/>
    <text x="200" y="30" text-anchor="middle" font-family="'SimHei',serif" font-size="16" font-weight="bold" fill="#f5f5dc">输出模式 Output Modes</text>

    <!-- 分析模式 -->
    <g transform="translate(30, 45)">
      <rect x="0" y="0" width="100" height="70" rx="6" fill="#2a1515" stroke="#CD5C5C"/>
      <text x="50" y="30" text-anchor="middle" font-size="20">📊</text>
      <text x="50" y="55" text-anchor="middle" font-family="'SimSun',serif" font-size="12" fill="#CD5C5C">分析模式</text>
    </g>

    <!-- 对话模式 -->
    <g transform="translate(150, 45)">
      <rect x="0" y="0" width="100" height="70" rx="6" fill="#2a2a15" stroke="#DAA520"/>
      <text x="50" y="30" text-anchor="middle" font-size="20">💬</text>
      <text x="50" y="55" text-anchor="middle" font-family="'SimSun',serif" font-size="12" fill="#DAA520">对话模式</text>
    </g>

    <!-- VTuber模式 -->
    <g transform="translate(270, 45)">
      <rect x="0" y="0" width="100" height="70" rx="6" fill="#15202a" stroke="#00CED1"/>
      <text x="50" y="30" text-anchor="middle" font-size="20">🎭</text>
      <text x="50" y="55" text-anchor="middle" font-family="'SimSun',serif" font-size="12" fill="#00CED1">VTuber</text>
    </g>
  </g>

  <!-- ===== 输出层 ===== -->
  <g transform="translate(850, 100)">
    <rect x="0" y="0" width="200" height="50" rx="8" fill="#2a2a2a" stroke="#00CED1" stroke-width="2" filter="url(#shadow)"/>
    <text x="100" y="32" text-anchor="middle" font-family="'SimSun',serif" font-size="16" fill="#f5f5dc">最终输出</text>
  </g>

  <!-- 输出详情 -->
  <g transform="translate(850, 170)">
    <rect x="0" y="0" width="200" height="120" rx="6" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
    <text x="100" y="25" text-anchor="middle" font-size="12" fill="#888">分析报告</text>
    <text x="100" y="50" text-anchor="middle" font-size="11" fill="#00CED1">结构化建议</text>
    <text x="100" y="75" text-anchor="middle" font-size="12" fill="#888">对话回复</text>
    <text x="100" y="100" text-anchor="middle" font-size="11" fill="#DAA520">语音+动画</text>
  </g>

  <!-- ===== 知识库 ===== -->
  <g transform="translate(100, 480)">
    <rect x="0" y="0" width="300" height="160" rx="8" fill="#1a1a1a" stroke="#DAA520" stroke-width="2" filter="url(#shadow)"/>
    <text x="150" y="30" text-anchor="middle" font-family="'SimHei',serif" font-size="16" font-weight="bold" fill="#DAA520">📚 知识库 Knowledge</text>
    <text x="150" y="55" text-anchor="middle" font-size="11" fill="#888">docs/knowledge/</text>
    <line x1="30" y1="65" x2="270" y2="65" stroke="#333"/>
    <text x="30" y="90" font-size="10" fill="#888">• 原始资料 (md/txt)</text>
    <text x="30" y="110" font-size="10" fill="#888">• PDF文档 (文字提取)</text>
    <text x="30" y="130" font-size="10" fill="#888">• 图片 (OCR识别)</text>
    <text x="30" y="150" font-size="10" fill="#CD5C5C">→ 自动同步到 SKILL.md</text>
  </g>

  <!-- ===== 参考资料 ===== -->
  <g transform="translate(450, 480)">
    <rect x="0" y="0" width="300" height="160" rx="8" fill="#1a1a1a" stroke="#666" stroke-width="2" filter="url(#shadow)"/>
    <text x="150" y="30" text-anchor="middle" font-family="'SimHei',serif" font-size="16" font-weight="bold" fill="#f5f5dc">📖 参考资料</text>
    <text x="150" y="55" text-anchor="middle" font-size="11" fill="#888">references/</text>
    <line x1="30" y1="65" x2="270" y2="65" stroke="#333"/>
    <text x="30" y="90" font-size="10" fill="#888">• 著作 (毛选四卷)</text>
    <text x="30" y="110" font-size="10" fill="#888">• 对话 (斯诺等访谈)</text>
    <text x="30" y="130" font-size="10" fill="#888">• 决策记录</text>
    <text x="30" y="150" font-size="10" fill="#888">• 时间线</text>
  </g>

  <!-- ===== mao-map ===== -->
  <g transform="translate(800, 480)">
    <rect x="0" y="0" width="300" height="160" rx="8" fill="#1a1a1a" stroke="#CD5C5C" stroke-width="2" filter="url(#shadow)"/>
    <text x="150" y="30" text-anchor="middle" font-family="'SimHei',serif" font-size="16" font-weight="bold" fill="#CD5C5C">🗺️ 毛主席足迹地图</text>
    <text x="150" y="55" text-anchor="middle" font-size="11" fill="#888">github.com/sansan0/mao-map</text>
    <line x1="30" y1="65" x2="270" y2="65" stroke="#333"/>
    <text x="30" y="90" font-size="10" fill="#888">• 1893-1976完整轨迹</text>
    <text x="30" y="110" font-size="10" fill="#888">• 109条关键事件</text>
    <text x="30" y="130" font-size="10" fill="#888">• Leaflet 交互地图</text>
    <text x="30" y="150" font-size="10" fill="#CD5C5C">→ 整合到时间线</text>
  </g>

  <!-- 底部版权 -->
  <text x="600" y="685" text-anchor="middle" font-size="11" fill="#666">mao-skill | MIT License | github.com/CochraneK/mao-skill</text>

  <!-- 连接线（简化） -->
  <path d="M300,125 L400,130" stroke="#CD5C5C" stroke-width="1" stroke-dasharray="4,4" fill="none" opacity="0.5"/>
  <path d="M800,125 L850,130" stroke="#00CED1" stroke-width="1" stroke-dasharray="4,4" fill="none" opacity="0.5"/>
  <path d="M600,280 L600,310" stroke="#DAA520" stroke-width="1" stroke-dasharray="4,4" fill="none" opacity="0.5"/>
  <path d="M600,450 L600,480" stroke="#666" stroke-width="1" stroke-dasharray="4,4" fill="none" opacity="0.5"/>
</svg>