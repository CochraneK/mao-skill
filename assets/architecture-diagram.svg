  <text x="150" y="480" font-family="'Microsoft YaHei'" font-size="10" fill="#e94560">输入解析</text>
  <text x="235" y="480" font-family="'Microsoft YaHei'" font-size="9" fill="#555">→</text>
  <text x="260" y="480" font-family="'Microsoft YaHei'" font-size="10" fill="#e94560">场景识别</text>
  <text x="345" y="480" font-family="'Microsoft YaHei'" font-size="9" fill="#555">→</text>
  <text x="370" y="480" font-family="'Microsoft YaHei'" font-size="10" fill="#ffc107">心智激活</text>
  <text x="455" y="480" font-family="'Microsoft YaHei'" font-size="9" fill="#555">→</text>
  <text x="480" y="480" font-family="'Microsoft YaHei'" font-size="10" fill="#ffc107">启发式决策</text>
  <text x="585" y="480" font-family="'Microsoft YaHei'" font-size="9" fill="#555">→</text>
  <text x="610" y="480" font-family="'Microsoft YaHei'" font-size="10" fill="#00d9ff">风格注入</text>
