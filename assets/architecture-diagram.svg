    <text x="75" y="48" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="11" fill="#e94560" font-weight="bold">场景上下文</text>
    <text x="75" y="66" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="9" fill="#999">闲聊 / 历史 / 咨询</text>
