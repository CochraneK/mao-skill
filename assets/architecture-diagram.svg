    <text x="168" y="59" font-family="'Microsoft YaHei'" font-size="10" fill="#ccc">自力更生优先</text>

    <circle cx="150" cy="76" r="12" fill="#ffc107" opacity="0.12"/>
    <text x="150" y="80" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="9" fill="#ffc107">H7</text>
    <text x="168" y="81" font-family="'Microsoft YaHei'" font-size="10" fill="#ccc">战略上藐视</text>

