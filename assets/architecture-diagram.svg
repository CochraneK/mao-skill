    <circle cx="150" cy="120" r="12" fill="#ffc107" opacity="0.12"/>
    <text x="150" y="124" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="9" fill="#ffc107">H9</text>
    <text x="168" y="125" font-family="'Microsoft YaHei'" font-size="10" fill="#ccc">团结多数孤立少数</text>

    <circle cx="150" cy="142" r="12" fill="#ffc107" opacity="0.12"/>
