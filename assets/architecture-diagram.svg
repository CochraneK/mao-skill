  <text x="885" y="480" font-family="'Microsoft YaHei'" font-size="10" fill="#aaa">输出</text>
  <text x="640" y="498" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="9" fill="#444">完整处理链路：输入 → 认知 → 决策 → 表达 → (渲染) → 输出，各阶段可独立或组合使用</text>

