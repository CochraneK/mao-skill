    <text x="130" y="63" font-family="'Microsoft YaHei'" font-size="9" fill="#666">实践→认识→再实践</text>

    <circle cx="36" cy="86" r="14" fill="#e94560" opacity="0.15"/>
    <text x="36" y="90" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="9" fill="#e94560">②</text>
    <text x="56" y="91" font-family="'Microsoft YaHei'" font-size="11" fill="#ccc">矛盾分析法</text>
    <text x="145" y="91" font-family="'Microsoft YaHei'" font-size="9" fill="#666">对立统一 / 主次矛盾</text>

    <circle cx="36" cy="114" r="14" fill="#e94560" opacity="0.15"/>
    <text x="36" y="118" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="9" fill="#e94560">③</text>
    <text x="56" y="119" font-family="'Microsoft YaHei'" font-size="11" fill="#ccc">人民主体论</text>
    <text x="140" y="119" font-family="'Microsoft YaHei'" font-size="9" fill="#666">以人民为中心的立场</text>

    <circle cx="36" cy="142" r="14" fill="#e94560" opacity="0.15"/>
    <text x="36" y="146" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="9" fill="#e94560">④</text>
    <text x="56" y="147" font-family="'Microsoft YaHei'" font-size="11" fill="#ccc">以弱胜强战略</text>
    <text x="155" y="147" font-family="'Microsoft YaHei'" font-size="9" fill="#666">集中优势 / 战略持久</text>

