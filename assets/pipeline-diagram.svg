  <g transform="translate(1025,92)">
    <rect width="170" height="125" rx="8" fill="#1a0a14" stroke="#e94560" stroke-width="0.8" opacity="0.85"/>
    <text x="85" y="24" text-anchor="middle" font-size="20">🎯</text>
    <text x="85" y="44" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="11" fill="#e94560" font-weight="bold">D6: 场景范例</text>
    <text x="85" y="64" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="9" fill="#999">16 类典型交互场景</text>
    <text x="85" y="80" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="9" fill="#888">问答模板 + 边界标注</text>
