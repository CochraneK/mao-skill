<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 735" width="1280" height="735">


  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#101025"/>
    </linearGradient>
    <filter id="gR"><feGaussianBlur stdDeviation="5" result="b"/><feFlood flood-color="#e94560" flood-opacity="0.4"/><feComposite in2="b" operator="in"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="gC"><feGaussianBlur stdDeviation="5" result="b"/><feFlood flood-color="#00d9ff" flood-opacity="0.35"/><feComposite in2="b" operator="in"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="gG"><feGaussianBlur stdDeviation="5" result="b"/><feFlood flood-color="#ffc107" flood-opacity="0.35"/><feComposite in2="b" operator="in"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="gGr"><feGaussianBlur stdDeviation="5" result="b"/><feFlood flood-color="#4caf50" flood-opacity="0.35"/><feComposite in2="b" operator="in"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="aw" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#555"/>
    </marker>
    <marker id="ag" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#ffc107" opacity="0.7"/>
    </marker>
    <marker id="ar" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#e94560" opacity="0.7"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="1280" height="720" fill="url(#bg)" rx="12"/>

  <!-- 标题 -->
  <text x="640" y="38" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="24" font-weight="bold" fill="#ffc107">🔬 构建流水线 — 女娲造人 6 维并行蒸馏</text>
  <line x1="360" y1="52" x2="920" y2="52" stroke="#333" stroke-width="1"/>

  <!-- ========== Phase 1: 六维采集 ========== -->
  <rect x="30" y="72" width="1220" height="160" rx="10" fill="#160c18" stroke="#e94560" stroke-width="1.3" filter="url(#gR)" opacity="0.8"/>

  <rect x="45" y="62" width="200" height="22" rx="4" fill="#e94560"/>
  <text x="145" y="77" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="11" fill="#fff" font-weight="bold">Phase 1: 六维并行信息采集</text>

  <!-- D1-D6 均匀分布：总可用宽度=1220-60(左右边距)=1160
       每个卡片宽度=175, 6个共1050, 剩余210/5个间隙=42间隙
       位置: 50, 267, 484, 701, 918, 1135 (但最后会超)
       改为: 宽度170, 起始x=50, 步长=195 → 50/245/440/635/830/1025
       最后一个R=1195, 在1220内 OK
  -->

  <!-- D1: 著作 -->
  <g transform="translate(50,92)">
    <rect width="170" height="125" rx="8" fill="#1a0a14" stroke="#e94560" stroke-width="0.8" opacity="0.85"/>
    <text x="85" y="24" text-anchor="middle" font-size="20">📚</text>
    <text x="85" y="44" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="11" fill="#e94560" font-weight="bold">D1: 著作原文</text>
    <text x="85" y="64" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="9" fill="#999">《毛泽东选集》1-5卷</text>
    <text x="85" y="80" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="9" fill="#888">《实践论》《矛盾论》等</text>
    <rect x="15" y="94" width="140" height="20" rx="10" fill="#e94560" opacity="0.12"/>
    <text x="85" y="108" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="9" fill="#e94560">~450 行原文</text>
  </g>

  <!-- D2: 研究报告 -->
  <g transform="translate(245,92)">
    <rect width="170" height="125" rx="8" fill="#1a0a14" stroke="#e94560" stroke-width="0.8" opacity="0.85"/>
    <text x="85" y="24" text-anchor="middle" font-size="20">📋</text>
    <text x="85" y="44" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="11" fill="#e94560" font-weight="bold">D2: 研究报告</text>
    <text x="85" y="64" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="9" fill="#999">学术研究 / 分析文章</text>
    <text x="85" y="80" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="9" fill="#888">一手来源占比 &gt;70%</text>
    <rect x="15" y="94" width="140" height="20" rx="10" fill="#e94560" opacity="0.12"/>
    <text x="85" y="108" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="9" fill="#e94560">~380 行分析</text>
  </g>

  <!-- D3: 对话样本 -->
  <g transform="translate(440,92)">
    <rect width="170" height="125" rx="8" fill="#1a0a14" stroke="#e94560" stroke-width="0.8" opacity="0.85"/>
    <text x="85" y="24" text-anchor="middle" font-size="20">💬</text>
    <text x="85" y="44" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="11" fill="#e94560" font-weight="bold">D3: 对话样本</text>
    <text x="85" y="64" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="9" fill="#999">访谈记录 / 演讲稿</text>
    <text x="85" y="80" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="9" fill="#888">口语化表达模式提取</text>
    <rect x="15" y="94" width="140" height="20" rx="10" fill="#e94560" opacity="0.12"/>
    <text x="85" y="108" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="9" fill="#e94560">~320 行对话</text>
  </g>

