  <g transform="translate(370,315)">
    <rect width="90" height="20" rx="10" fill="#00d9ff" opacity="0.12"/>
    <text x="45" y="14" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="10" fill="#00d9ff">5 大模型 ✅</text>

    <rect x="100" y="0" width="100" height="20" rx="10" fill="#00d9ff" opacity="0.12"/>
    <text x="150" y="14" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="10" fill="#00d9ff">10 条启发式 ✅</text>

    <rect x="210" y="0" width="110" height="20" rx="10" fill="#00d9ff" opacity="0.12"/>
    <text x="265" y="14" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="10" fill="#00d9ff">16 场景范例 ✅</text>

    <rect x="330" y="0" width="90" height="20" rx="10" fill="#00d9ff" opacity="0.12"/>
    <text x="375" y="14" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="10" fill="#00d9ff">风格规则 ✅</text>
  </g>

  <!-- 箭头 P2→P3 -->
  <path d="M640,348 L640,378" stroke="#555" stroke-width="2" marker-end="url(#aw)"/>

  <!-- ========== Phase 3: SKILL.md 组装 ========== -->
  <rect x="180" y="385" width="920" height="75" rx="10" fill="#161410" stroke="#ffc107" stroke-width="1.3" filter="url(#gG)" opacity="0.85"/>

  <circle cx="210" cy="422" r="16" fill="#ffc107" opacity="0.18"/>
  <text x="210" y="427" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="13" fill="#ffc107" font-weight="bold">3</text>
  <text x="640" y="412" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="15" fill="#ffc107" font-weight="bold">Phase 3: SKILL.md 结构化组装</text>

  <text x="640" y="436" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="11" fill="#aaa">
    frontmatter → 触发条件 → 心智模型(×5) → 启发式(×10) → 表达风格 → 场景范例(×16) → 边界声明
  </text>
  <text x="640" y="454" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="10" fill="#666">
    遵循女娲造人 Skill 规范 · 可被 WorkBuddy 直接加载运行
  </text>

  <!-- 箭头 P3→P4 -->
  <path d="M640,465 L640,495" stroke="#555" stroke-width="2" marker-end="url(#aw)"/>

  <!-- ========== Phase 4: 四维验证 ========== -->
  <rect x="240" y="502" width="800" height="62" rx="10" fill="#0c1a0c" stroke="#4caf50" stroke-width="1.3" filter="url(#gGr)" opacity="0.85"/>

  <circle cx="270" cy="533" r="14" fill="#4caf50" opacity="0.15"/>
  <text x="270" y="538" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="12" fill="#4caf50" font-weight="bold">4</text>
  <text x="640" y="526" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="14" fill="#4caf50" font-weight="bold">Phase 4: 四维质量验证</text>

  <!-- 4个验证标签 - 更宽松的间距 -->
  <g transform="translate(400,538)">
    <rect width="95" height="20" rx="10" fill="#4caf50" opacity="0.15"/>
    <text x="47" y="14" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="10" fill="#4caf50">结构完整性 ✅</text>

    <rect x="105" y="0" width="120" height="20" rx="10" fill="#4caf50" opacity="0.15"/>
    <text x="165" y="14" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="10" fill="#4caf50">内容一致性 93%✅</text>

    <rect x="235" y="0" width="84" height="20" rx="10" fill="#4caf50" opacity="0.15"/>
    <text x="277" y="14" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="10" fill="#4caf50">加载测试 ✅</text>

    <rect x="329" y="0" width="116" height="20" rx="10" fill="#4caf50" opacity="0.15"/>
    <text x="387" y="14" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="10" fill="#4caf50">边界诚实性 8/8✅</text>
  </g>

  <!-- 箭头 P4→P5 -->
  <path d="M640,569 L640,597" stroke="#ffc107" stroke-width="2.5" marker-end="url(#ag)"/>

  <!-- ========== Phase 5: 迭代升级 ========== -->
  <rect x="150" y="603" width="980" height="54" rx="10" fill="#e94560" opacity="0.08" stroke="#e94560" stroke-width="1.2"/>

  <text x="640" y="626" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="13" fill="#ccc">
    v1.0 (375行) → v1.1 (445) → v1.2 (799) → v1.3 (920)
  </text>
  <text x="640" y="647" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="15" fill="#ffc107" font-weight="bold">
    → v1.4 (1008行) 🎯
  </text>

  <!-- 底部统计栏 -->
  <rect x="30" y="672" width="1220" height="32" rx="6" fill="#111118" stroke="#222" stroke-width="0.5" opacity="0.6"/>
  <text x="640" y="692" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="10" fill="#666">总采集量 ~2300行 → 蒸馏为 SKILL.md 1008行（压缩率 56%）· 女娲造人蒸馏法 Huashu Nuwa Framework</text>

</svg>
