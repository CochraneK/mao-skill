<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="pipeBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#CD5C5C"/>
      <stop offset="100%" stop-color="#8B0000"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#DAA520"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#DAA520"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="600" fill="url(#pipeBg)"/>

  <!-- 标题区 -->
  <rect x="0" y="0" width="1200" height="50" fill="#8B0000"/>
  <text x="600" y="35" text-anchor="middle" font-family="'SimHei',serif" font-size="24" font-weight="bold" fill="#FFD700">6维并行蒸馏流水线</text>
  <line x1="0" y1="50" x2="1200" y2="50" stroke="#DAA520" stroke-width="2"/>

  <!-- 6个维度 -->
  <!-- 维度1: 著作 -->
  <g transform="translate(80, 80)">
    <rect x="0" y="0" width="160" height="100" rx="8" fill="#1a1a1a" stroke="#CD5C5C" stroke-width="2" filter="url(#shadow)"/>
    <text x="80" y="30" text-anchor="middle" font-size="28">📖</text>
    <text x="80" y="60" text-anchor="middle" font-family="'SimSun',serif" font-size="14" fill="#f5f5dc" font-weight="bold">著作</text>
    <text x="80" y="80" text-anchor="middle" font-size="10" fill="#888">毛选四卷、文集</text>
  </g>

  <!-- 维度2: 对话 -->
  <g transform="translate(260, 80)">
    <rect x="0" y="0" width="160" height="100" rx="8" fill="#1a1a1a" stroke="#DAA520" stroke-width="2" filter="url(#shadow)"/>
    <text x="80" y="30" text-anchor="middle" font-size="28">💬</text>
    <text x="80" y="60" text-anchor="middle" font-family="'SimSun',serif" font-size="14" fill="#f5f5dc" font-weight="bold">对话</text>
    <text x="80" y="80" text-anchor="middle" font-size="10" fill="#888">斯诺、斯特朗访谈</text>
  </g>

  <!-- 维度3: 表达DNA -->
  <g transform="translate(440, 80)">
    <rect x="0" y="0" width="160" height="100" rx="8" fill="#1a1a1a" stroke="#00CED1" stroke-width="2" filter="url(#shadow)"/>
    <text x="80" y="30" text-anchor="middle" font-size="28">🧬</text>
    <text x="80" y="60" text-anchor="middle" font-family="'SimSun',serif" font-size="14" fill="#f5f5dc" font-weight="bold">表达DNA</text>
    <text x="80" y="80" text-anchor="middle" font-size="10" fill="#888">修辞、语言节奏</text>
  </g>

  <!-- 维度4: 他者视角 -->
  <g transform="translate(620, 80)">
    <rect x="0" y="0" width="160" height="100" rx="8" fill="#1a1a1a" stroke="#666" stroke-width="2" filter="url(#shadow)"/>
    <text x="80" y="30" text-anchor="middle" font-size="28">👥</text>
    <text x="80" y="60" text-anchor="middle" font-family="'SimSun',serif" font-size="14" fill="#f5f5dc" font-weight="bold">他者视角</text>
    <text x="80" y="80" text-anchor="middle" font-size="10" fill="#888">中外学者评价</text>
  </g>

  <!-- 维度5: 决策记录 -->
  <g transform="translate(800, 80)">
    <rect x="0" y="0" width="160" height="100" rx="8" fill="#1a1a1a" stroke="#4CAF50" stroke-width="2" filter="url(#shadow)"/>
    <text x="80" y="30" text-anchor="middle" font-size="28">⚡</text>
    <text x="80" y="60" text-anchor="middle" font-family="'SimSun',serif" font-size="14" fill="#f5f5dc" font-weight="bold">决策记录</text>
    <text x="80" y="80" text-anchor="middle" font-size="10" fill="#888">遵义、重庆谈判</text>
  </g>

  <!-- 维度6: 时间线 -->
  <g transform="translate(980, 80)">
    <rect x="0" y="0" width="160" height="100" rx="8" fill="#1a1a1a" stroke="#9370DB" stroke-width="2" filter="url(#shadow)"/>
    <text x="80" y="30" text-anchor="middle" font-size="28">📅</text>
    <text x="80" y="60" text-anchor="middle" font-family="'SimSun',serif" font-size="14" fill="#f5f5dc" font-weight="bold">时间线</text>
    <text x="80" y="80" text-anchor="middle" font-size="10" fill="#888">28岁→83岁人生</text>
  </g>

  <!-- 箭头向下 -->
  <g transform="translate(570, 200)">
    <polygon points="30,0 60,30 45,30 45,60 15,60 15,30 0,30" fill="#DAA520"/>
  </g>

  <!-- 数据采集 -->
  <g transform="translate(400, 280)">
    <rect x="0" y="0" width="400" height="60" rx="8" fill="#1a1a1a" stroke="url(#goldGrad)" stroke-width="2" filter="url(#shadow)"/>
    <text x="200" y="38" text-anchor="middle" font-family="'SimHei',serif" font-size="18" fill="#FFD700">数据采集 → 交叉验证 → 结构化提炼</text>
  </g>

  <!-- 箭头向下 -->
  <g transform="translate(570, 360)">
    <polygon points="30,0 60,30 45,30 45,60 15,60 15,30 0,30" fill="#DAA520"/>
  </g>

  <!-- 质量验证 -->
  <g transform="translate(350, 440)">
    <rect x="0" y="0" width="500" height="80" rx="8" fill="#1a1a1a" stroke="#CD5C5C" stroke-width="2" filter="url(#shadow)"/>
    <text x="250" y="25" text-anchor="middle" font-family="'SimHei',serif" font-size="16" fill="#f5f5dc" font-weight="bold">四维质量验证</text>

    <!-- 4个验证维度 -->
    <g transform="translate(30, 40)">
      <circle cx="15" cy="15" r="12" fill="url(#redGrad)"/>
      <text x="15" y="19" text-anchor="middle" font-size="10" fill="#fff">1</text>
      <text x="60" y="20" font-size="11" fill="#888">结构完整</text>
    </g>
    <g transform="translate(150, 40)">
      <circle cx="15" cy="15" r="12" fill="url(#redGrad)"/>
      <text x="15" y="19" text-anchor="middle" font-size="10" fill="#fff">2</text>
      <text x="60" y="20" font-size="11" fill="#888">内容一致</text>
    </g>
    <g transform="translate(270, 40)">
      <circle cx="15" cy="15" r="12" fill="url(#redGrad)"/>
      <text x="15" y="19" text-anchor="middle" font-size="10" fill="#fff">3</text>
      <text x="60" y="20" font-size="11" fill="#888">加载测试</text>
    </g>
    <g transform="translate(390, 40)">
      <circle cx="15" cy="15" r="12" fill="url(#redGrad)"/>
      <text x="15" y="19" text-anchor="middle" font-size="10" fill="#fff">4</text>
      <text x="60" y="20" font-size="11" fill="#888">端到端效果</text>
    </g>
  </g>

  <!-- 输出到SKILL.md -->
  <g transform="translate(450, 540)">
    <rect x="0" y="0" width="300" height="45" rx="6" fill="#8B0000"/>
    <text x="150" y="30" text-anchor="middle" font-family="'SimSun',serif" font-size="14" fill="#FFD700">输出: SKILL.md (1008行)</text>
  </g>

  <!-- 底部版权 -->
  <text x="600" y="590" text-anchor="middle" font-size="10" fill="#666">mao-skill | 基于"女娲造人"6维并行蒸馏法</text>
</svg>