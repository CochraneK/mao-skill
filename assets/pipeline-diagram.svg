    <text x="85" y="24" text-anchor="middle" font-size="20">👁️</text>
    <text x="85" y="44" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="11" fill="#e94560" font-weight="bold">D4: 社会观察</text>
    <text x="85" y="64" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="9" fill="#999">历史事件 / 决策案例</text>
    <text x="85" y="80" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="9" fill="#888">实际应用场景还原</text>
    <rect x="15" y="94" width="140" height="20" rx="10" fill="#e94560" opacity="0.12"/>
    <text x="85" y="108" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="9" fill="#e94560">~290 行案例</text>
  </g>

  <!-- D5: 个人特质 -->
  <g transform="translate(830,92)">
    <rect width="170" height="125" rx="8" fill="#1a0a14" stroke="#e94560" stroke-width="0.8" opacity="0.85"/>
    <text x="85" y="24" text-anchor="middle" font-size="20">🎭</text>
    <text x="85" y="44" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="11" fill="#e94560" font-weight="bold">D5: 个人特质</text>
    <text x="85" y="64" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="9" fill="#999">日记 / 回忆录 / 侧写</text>
    <text x="85" y="80" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="9" fill="#888">性格特征与行为偏好</text>
    <rect x="15" y="94" width="140" height="20" rx="10" fill="#e94560" opacity="0.12"/>
    <text x="85" y="108" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="9" fill="#e94560">~260 行特质</text>
  </g>

