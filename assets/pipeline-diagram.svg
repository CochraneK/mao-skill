  <rect x="250" y="275" width="780" height="68" rx="10" fill="#141020" stroke="#00d9ff" stroke-width="1.3" filter="url(#gC)" opacity="0.85"/>

  <circle cx="280" cy="309" r="16" fill="#00d9ff" opacity="0.15"/>
  <text x="280" y="314" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="13" fill="#00d9ff" font-weight="bold">2</text>
  <text x="640" y="300" text-anchor="middle" font-family="'Microsoft YaHei'" font-size="15" fill="#00d9ff" font-weight="bold">Phase 2: 思维框架提炼</text>

