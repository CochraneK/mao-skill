<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320">
  <defs>
    <!-- 复古革命配色 -->
    <linearGradient id="bannerBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8B0000"/>
      <stop offset="40%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#DAA520"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#DAA520"/>
    </linearGradient>
    <linearGradient id="redStar" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF4500"/>
      <stop offset="100%" stop-color="#8B0000"/>
    </linearGradient>
    <!-- 纸张纹理 -->
    <filter id="paperTexture">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" result="noise"/>
      <feDiffuseLighting in="noise" lighting-color="#f5f5dc" surfaceScale="2">
        <feDistantLight azimuth="45" elevation="60"/>
      </feDiffuseLighting>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1280" height="320" fill="url(#bannerBg)"/>

  <!-- 顶部装饰线 -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#goldLine)"/>
  <rect x="0" y="4" width="1280" height="2" fill="#8B0000"/>

  <!-- 底部装饰线 -->
  <rect x="0" y="314" width="1280" height="2" fill="#8B0000"/>
  <rect x="0" y="316" width="1280" height="4" fill="url(#goldLine)"/>

  <!-- 左边麦穗装饰 -->
  <g transform="translate(30, 40)" opacity="0.6">
    <path d="M10,200 Q5,150 15,100 Q25,50 20,0" stroke="#DAA520" stroke-width="2" fill="none"/>
    <ellipse cx="15" cy="30" rx="8" ry="15" fill="#DAA520" transform="rotate(-20 15 30)"/>
    <ellipse cx="12" cy="60" rx="7" ry="13" fill="#DAA520" transform="rotate(-25 12 60)"/>
    <ellipse cx="10" cy="90" rx="6" ry="12" fill="#DAA520" transform="rotate(-30 10 90)"/>
    <ellipse cx="8" cy="118" rx="5" ry="10" fill="#DAA520" transform="rotate(-35 8 118)"/>
  </g>

  <!-- 右边麦穗装饰 -->
  <g transform="translate(1230, 40) scale(-1, 1)" opacity="0.6">
    <path d="M10,200 Q5,150 15,100 Q25,50 20,0" stroke="#DAA520" stroke-width="2" fill="none"/>
    <ellipse cx="15" cy="30" rx="8" ry="15" fill="#DAA520" transform="rotate(-20 15 30)"/>
    <ellipse cx="12" cy="60" rx="7" ry="13" fill="#DAA520" transform="rotate(-25 12 60)"/>
    <ellipse cx="10" cy="90" rx="6" ry="12" fill="#DAA520" transform="rotate(-30 10 90)"/>
    <ellipse cx="8" cy="118" rx="5" ry="10" fill="#DAA520" transform="rotate(-35 8 118)"/>
  </g>

  <!-- 五角星装饰 左上 -->
  <polygon points="80,60 83,72 96,72 86,80 90,93 80,85 70,93 74,80 64,72 77,72" fill="url(#redStar)" opacity="0.5" transform="translate(-20, 10) scale(0.8)"/>
  <polygon points="80,60 83,72 96,72 86,80 90,93 80,85 70,93 74,80 64,72 77,72" fill="url(#redStar)" opacity="0.3" transform="translate(110, 30) scale(0.5)"/>

  <!-- 延安宝塔山轮廓 -->
  <g transform="translate(150, 180)" opacity="0.15">
    <polygon points="0,100 10,80 20,80 30,60 40,60 50,80 60,80 70,40 80,40 90,80 140,80 140,100" fill="none" stroke="#DAA520" stroke-width="2"/>
    <polygon points="60,40 70,10 80,40" fill="#DAA520"/>
    <line x1="70" y1="10" x2="70" y2="0" stroke="#DAA520" stroke-width="2"/>
    <circle cx="70" cy="-5" r="5" fill="#DAA520"/>
  </g>

  <!-- 主标题 -->
  <text x="640" y="145" text-anchor="middle" font-family="'SimHei','Microsoft YaHei',serif" font-size="72" font-weight="bold" fill="#FFD700" stroke="#8B0000" stroke-width="1">mao-skill</text>

  <!-- 副标题 -->
  <text x="640" y="185" text-anchor="middle" font-family="'SimSun','KaiTi',serif" font-size="22" fill="#f5f5dc">毛泽东思维视角 AI Skill</text>

  <!-- 分隔线 -->
  <line x1="340" y1="210" x2="940" y2="210" stroke="#DAA520" stroke-width="1" opacity="0.6"/>

  <!-- 描述 -->
  <text x="640" y="245" text-anchor="middle" font-family="'SimSun',serif" font-size="16" fill="#c9b896">认知框架 × 决策逻辑 × 表达风格</text>

  <!-- 版本号 -->
  <rect x="580" y="260" width="120" height="28" rx="4" fill="#8B0000" opacity="0.8"/>
  <text x="640" y="280" text-anchor="middle" font-family="'Courier New',monospace" font-size="14" fill="#FFD700">v1.4.3</text>

  <!-- 右下角印章 -->
  <g transform="translate(1150, 220)">
    <rect x="0" y="0" width="70" height="70" rx="4" fill="none" stroke="#8B0000" stroke-width="3"/>
    <text x="35" y="35" text-anchor="middle" font-family="'SimHei',serif" font-size="28" fill="#8B0000">毛</text>
    <text x="35" y="58" text-anchor="middle" font-family="'SimSun',serif" font-size="10" fill="#8B0000">思想</text>
  </g>

  <!-- 五角星装饰 右下 -->
  <polygon points="80,60 83,72 96,72 86,80 90,93 80,85 70,93 74,80 64,72 77,72" fill="url(#redStar)" opacity="0.4" transform="translate(1130, 250) scale(0.6)"/>
  <polygon points="80,60 83,72 96,72 86,80 90,93 80,85 70,93 74,80 64,72 77,72" fill="url(#redStar)" opacity="0.3" transform="translate(180, 260) scale(0.4)"/>

  <!-- 砖墙纹理效果（简化） -->
  <g opacity="0.05">
    <line x1="0" y1="40" x2="1280" y2="40" stroke="#000" stroke-width="1"/>
    <line x1="0" y1="80" x2="1280" y2="80" stroke="#000" stroke-width="1"/>
    <line x1="0" y1="120" x2="1280" y2="120" stroke="#000" stroke-width="1"/>
    <line x1="0" y1="160" x2="1280" y2="160" stroke="#000" stroke-width="1"/>
    <line x1="0" y1="200" x2="1280" y2="200" stroke="#000" stroke-width="1"/>
    <line x1="0" y1="240" x2="1280" y2="240" stroke="#000" stroke-width="1"/>
    <line x1="0" y1="280" x2="1280" y2="280" stroke="#000" stroke-width="1"/>
  </g>
</svg>