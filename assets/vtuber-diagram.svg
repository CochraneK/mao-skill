<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500">
  <defs>
    <linearGradient id="vtBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#CD5C5C"/>
      <stop offset="100%" stop-color="#8B0000"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#DAA520"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#DAA520"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="500" fill="url(#vtBg)"/>

  <!-- 标题区 -->
  <rect x="0" y="0" width="1200" height="50" fill="#8B0000"/>
  <text x="600" y="35" text-anchor="middle" font-family="'SimHei',serif" font-size="24" font-weight="bold" fill="#FFD700">VTuber 集成架构</text>
  <line x1="0" y1="50" x2="1200" y2="50" stroke="#DAA520" stroke-width="2"/>

  <!-- 左侧：用户输入 -->
  <g transform="translate(80, 100)">
    <rect x="0" y="0" width="180" height="80" rx="8" fill="#1a1a1a" stroke="#CD5C5C" stroke-width="2" filter="url(#shadow)"/>
    <text x="90" y="35" text-anchor="middle" font-size="24">💬</text>
    <text x="90" y="60" text-anchor="middle" font-family="'SimSun',serif" font-size="14" fill="#f5f5dc">用户语音/文字</text>
  </g>

  <!-- 箭头 -->
  <g transform="translate(280, 125)">
    <polygon points="20,0 40,15 20,30 0,15" fill="#DAA520"/>
  </g>

  <!-- 大模型处理 -->
  <g transform="translate(340, 80)">
    <rect x="0" y="0" width="200" height="120" rx="8" fill="#1a1a1a" stroke="url(#goldGrad)" stroke-width="2" filter="url(#shadow)"/>
    <text x="100" y="35" text-anchor="middle" font-size="28">🤖</text>
    <text x="100" y="65" text-anchor="middle" font-family="'SimHei',serif" font-size="14" fill="#FFD700" font-weight="bold">LLM 大模型</text>
    <text x="100" y="90" text-anchor="middle" font-size="11" fill="#888">Claude/GPT/国产模型</text>
  </g>

  <!-- 箭头 -->
  <g transform="translate(560, 125)">
    <polygon points="20,0 40,15 20,30 0,15" fill="#DAA520"/>
  </g>

  <!-- SKILL -->
  <g transform="translate(620, 80)">
    <rect x="0" y="0" width="180" height="120" rx="8" fill="#1a1a1a" stroke="#CD5C5C" stroke-width="2" filter="url(#shadow)"/>
    <text x="90" y="35" text-anchor="middle" font-size="28">📖</text>
    <text x="90" y="65" text-anchor="middle" font-family="'SimHei',serif" font-size="14" fill="#CD5C5C" font-weight="bold">mao-skill</text>
    <text x="90" y="85" text-anchor="middle" font-size="11" fill="#888">毛泽东思维框架</text>
    <text x="90" y="105" text-anchor="middle" font-size="10" fill="#666">对话模式 persona</text>
  </g>

  <!-- 箭头 -->
  <g transform="translate(820, 125)">
    <polygon points="20,0 40,15 20,30 0,15" fill="#DAA520"/>
  </g>

  <!-- 右侧：TTS -->
  <g transform="translate(880, 80)">
    <rect x="0" y="0" width="200" height="120" rx="8" fill="#1a1a1a" stroke="#00CED1" stroke-width="2" filter="url(#shadow)"/>
    <text x="100" y="35" text-anchor="middle" font-size="28">🔊</text>
    <text x="100" y="65" text-anchor="middle" font-family="'SimHei',serif" font-size="14" fill="#00CED1" font-weight="bold">TTS 语音合成</text>
    <text x="100" y="90" text-anchor="middle" font-size="11" fill="#888">CosyVoice2 / EdgeTTS</text>
    <text x="100" y="105" text-anchor="middle" font-size="10" fill="#666">benjamin 音色</text>
  </g>

  <!-- 底部：Live2D -->
  <g transform="translate(400, 250)">
    <rect x="0" y="0" width="400" height="180" rx="10" fill="#1a1a1a" stroke="url(#goldGrad)" stroke-width="2" filter="url(#shadow)"/>
    <text x="200" y="35" text-anchor="middle" font-size="32">🎭</text>
    <text x="200" y="70" text-anchor="middle" font-family="'SimHei',serif" font-size="18" fill="#FFD700" font-weight="bold">Live2D 虚拟形象</text>

    <!-- 角色信息 -->
    <g transform="translate(30, 90)">
      <text x="0" y="0" font-size="12" fill="#888">角色模型:</text>
      <text x="80" y="0" font-size="12" fill="#f5f5dc">mao_pro</text>
    </g>
    <g transform="translate(30, 115)">
      <text x="0" y="0" font-size="12" fill="#888">语音风格:</text>
      <text x="80" y="0" font-size="12" fill="#DAA520">沙哑低沉/湖南口音</text>
    </g>
    <g transform="translate(30, 140)">
      <text x="0" y="0" font-size="12" fill="#888">动作捕捉:</text>
      <text x="80" y="0" font-size="12" fill="#00CED1">自动匹配对话情绪</text>
    </g>
  </g>

  <!-- 底部输出 -->
  <g transform="translate(450, 460)">
    <rect x="0" y="0" width="300" height="35" rx="6" fill="#8B0000"/>
    <text x="150" y="24" text-anchor="middle" font-family="'SimSun',serif" font-size="12" fill="#f5f5dc">输出: 语音 + Live2D 动画</text>
  </g>

  <!-- 项目信息 -->
  <g transform="translate(50, 380)">
    <text x="0" y="0" font-size="11" fill="#666">相关项目:</text>
    <text x="0" y="20" font-size="11" fill="#888">• Open-LLM-VTuber</text>
    <text x="0" y="40" font-size="11" fill="#888">• 硅基流动 CosyVoice2</text>
    <text x="0" y="60" font-size="11" fill="#888">• Live2D Models</text>
  </g>

  <!-- 底部版权 -->
  <text x="1100" y="485" text-anchor="middle" font-size="10" fill="#666">mao-skill VTuber Mode</text>
</svg>